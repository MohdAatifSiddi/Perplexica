use_default_settings: false

general:
  instance_name: 'searxng'

search:
  safe_search: 0
  autocomplete: ""
  default_lang: ""
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "CHANGE_THIS_TO_SOMETHING_SECURE"
  base_url: false
  image_proxy: true
  http_protocol_version: "1.0"
  method: "GET"
  cors_support: true
  cors_allow_origin: "*"
  cors_allow_credentials: true
  cors_allow_headers: ["*"]
  cors_allow_methods: ["*"]

ui:
  static_use_hash: true
  theme: simple
  results_on_new_tab: false
  infinite_scroll: false
  center_alignment: true
  query_in_title: true
  search_on_category_select: true
  cache: true

outgoing:
  request_timeout: 2.0
  enable_http_proxy: false
  max_request_timeout: 3.5
  pool_connections: 100
  pool_maxsize: 100
  max_retries: 3
  retry_on_http_error: false
  pool_block: false
  useragent_suffix: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

result_proxy:
  url: ""
  key: ""

plugins: {}

engines:
  - name: google
    shortcut: g
    search_url: https://www.google.com/search?q={query}&start={pageno}0
    disabled: false
  - name: soundcloud
    disabled: true
  - name: bing
    disabled: true
  - name: duckduckgo
    disabled: true
  - name: yahoo
    disabled: true
  - name: qwant
    disabled: true
  - name: startpage
    disabled: true
  - name: brave
    disabled: true
  - name: mojeek
    disabled: true
  - name: archlinux
    disabled: true
  - name: archive
    disabled: true
  - name: arxiv
    disabled: true
  - name: wikipedia
    disabled: true
  - name: wikidata
    disabled: true
  - name: wikimedia
    disabled: true
  - name: wolframalpha
    disabled: true
  - name: youtube
    disabled: true
  - name: dailymotion
    disabled: true
  - name: vimeo
    disabled: true
  - name: reddit
    disabled: true
  - name: twitter
